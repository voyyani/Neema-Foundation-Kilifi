# Supabase project config — required by the Supabase CLI for Edge Function deployment.
# Replace `project_id` below with your actual project ref from:
#   https://supabase.com/dashboard/project/<ref>/settings/general
#
# To deploy the invite-user function:
#   npx supabase login
#   npx supabase link --project-ref <your-project-ref>
#   npx supabase functions deploy invite-user

project_id = "sflwsxrihvzpbrcwhknl"

[functions.invite-user]
verify_jwt = true

[functions.bank-details]
verify_jwt = true

[functions.send-reply]
# Admin reply endpoint — JWT verified, role-checked inside the function
verify_jwt = true

[functions.send-notification]
# Public endpoint — called by unauthenticated form submissions
verify_jwt = false

[functions.check-maintenance-schedule]
# Called by pg_cron — no JWT needed (uses service role key directly)
verify_jwt = false

[functions.maintenance-notify]
# Called by database webhook on maintenance_status_updates INSERT — no JWT needed
verify_jwt = false
